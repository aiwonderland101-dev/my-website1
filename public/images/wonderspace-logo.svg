<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="WonderSpace logo">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff7070"/>
      <stop offset="30%" stop-color="#ff1a1a"/>
      <stop offset="55%" stop-color="#b30000"/>
      <stop offset="85%" stop-color="#000000"/>
    </radialGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="noise" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" in2="noise" mode="overlay" />
    </filter>
  </defs>

  <rect width="100%" height="100%" rx="12" fill="url(#g1)" filter="url(#grain)" />

  <text x="50%" y="55%" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="-0.02em">WS</text>
</svg>
